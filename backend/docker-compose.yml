services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: recon
      POSTGRES_DB: recon
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - recon_pg:/var/lib/postgresql/data
volumes:
  recon_pg:
